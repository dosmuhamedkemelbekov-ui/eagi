<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EAGI Mini App</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>EAGI Mini App</h1>
      <p class="subtitle">Мини-приложение внутри Telegram</p>

      <section class="card">
        <p><strong>Пользователь:</strong> <span id="user-name">Гость</span></p>
        <p><strong>Баллы:</strong> <span id="points">120</span></p>
        <p><strong>Social GPA:</strong> <span id="gpa">48</span></p>
      </section>

      <section class="card actions">
        <button id="add-points-btn">+10 за активность</button>
        <button id="send-data-btn">Отправить данные</button>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
